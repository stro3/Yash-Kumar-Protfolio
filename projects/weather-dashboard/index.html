<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Analytics Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="header">
            <h1 class="logo">WeatherHub</h1>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-input" placeholder="Search city...">
                <button id="searchBtn" class="search-btn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"></circle>
                        <path d="m21 21-4.35-4.35"></path>
                    </svg>
                </button>
            </div>
            <button id="unitToggle" class="unit-toggle">°C / °F</button>
        </header>

        <main class="main-content">
            <section class="current-weather">
                <div class="weather-card main-card">
                    <div class="location-info">
                        <h2 id="cityName">Loading...</h2>
                        <p id="dateTime" class="date-time"></p>
                    </div>
                    <div class="weather-display">
                        <div class="temp-container">
                            <span id="temperature" class="temperature">--</span>
                            <span id="tempUnit" class="temp-unit">°C</span>
                        </div>
                        <div class="weather-icon" id="weatherIcon">
                            <svg width="100" height="100" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                stroke-width="1.5">
                                <circle cx="12" cy="12" r="5"></circle>
                                <path
                                    d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42">
                                </path>
                            </svg>
                        </div>
                    </div>
                    <p id="weatherDesc" class="weather-description">--</p>
                </div>
            </section>

            <section class="weather-details">
                <div class="detail-card">
                    <div class="detail-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2v20M2 12h20"></path>
                        </svg>
                    </div>
                    <div class="detail-info">
                        <span class="detail-label">Feels Like</span>
                        <span id="feelsLike" class="detail-value">--°</span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path>
                        </svg>
                    </div>
                    <div class="detail-info">
                        <span class="detail-label">Humidity</span>
                        <span id="humidity" class="detail-value">--%</span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path
                                d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2">
                            </path>
                        </svg>
                    </div>
                    <div class="detail-info">
                        <span class="detail-label">Wind Speed</span>
                        <span id="windSpeed" class="detail-value">-- km/h</span>
                    </div>
                </div>
                <div class="detail-card">
                    <div class="detail-icon">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="M12 6v6l4 2"></path>
                        </svg>
                    </div>
                    <div class="detail-info">
                        <span class="detail-label">Pressure</span>
                        <span id="pressure" class="detail-value">-- hPa</span>
                    </div>
                </div>
            </section>

            <section class="forecast-section">
                <h3 class="section-title">5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container">
                </div>
            </section>
        </main>

        <footer class="footer">
            <p>Weather data provided by OpenWeatherMap API</p>
            <p>Built by Yash Kumar</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>

</html>
